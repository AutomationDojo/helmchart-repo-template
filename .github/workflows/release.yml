name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      docs_only:
        description: 'Run only the docs job (build and publish MkDocs to gh-pages)'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  check-init:
    name: Check if repo is initialised
    runs-on: ubuntu-latest
    outputs:
      initialised: ${{ steps.check.outputs.initialised }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f "charts/.gitkeep" ]; then
            echo "initialised=false" >> "$GITHUB_OUTPUT"
          else
            echo "initialised=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Semantic Release
    needs: check-init
    if: >
      needs.check-init.outputs.initialised == 'true' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.docs_only != 'true'))
    uses: AutomationDojo/reusable-cicd/.github/workflows/semantic-release_simple-release.yml@main
    with:
      node-version: "20"
      chart-path: "charts/CHART_NAME"
      extra-plugins: |
        semantic-release-helm
        @semantic-release/exec
      pre-install: |
        version=v1.14.2
        curl -sSLo /tmp/helm-docs.tar.gz "https://github.com/norwoodj/helm-docs/releases/download/${version}/helm-docs_${version#v}_Linux_x86_64.tar.gz"
        tar -xzf /tmp/helm-docs.tar.gz -C /tmp helm-docs
        install -m 755 /tmp/helm-docs /usr/local/bin/helm-docs
    secrets:
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

  publish:
    name: Publish Helm Chart
    needs: release
    if: needs.release.outputs.new-release == 'true'
    uses: AutomationDojo/reusable-cicd/.github/workflows/helm-releaser.yml@main
    with:
      charts_dir: charts
      config: .github/configs/cr.yaml
      push_oci: true
      ref: refs/tags/v${{ needs.release.outputs.version }}
    secrets:
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

  docs:
    name: Build and Publish Docs
    needs: [release, publish]
    if: needs.release.outputs.new-release == 'true'
    uses: AutomationDojo/reusable-cicd/.github/workflows/mkdocs-helm_deploy.yml@main
    with:
      python-version: "3.x"
      docs-subdir: docs
      pages-branch: gh-pages
    secrets:
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

  docs-only:
    name: Build and Publish Docs (manual)
    needs: check-init
    if: >
      needs.check-init.outputs.initialised == 'true' &&
      github.event_name == 'workflow_dispatch' && github.event.inputs.docs_only == 'true'
    uses: AutomationDojo/reusable-cicd/.github/workflows/mkdocs-helm_deploy.yml@main
    with:
      python-version: "3.x"
      docs-subdir: docs
      pages-branch: gh-pages
    secrets:
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
